<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Prend Ton Temps</title>
    <script>
      // Trick SPA pour GitHub Pages :
      // redirige les 404 vers index.html en conservant le path dans sessionStorage
      var path = window.location.pathname;
      var base = '/prend-ton-temps'; // À adapter si le repo a un nom différent
      if (path.indexOf(base) === 0) {
        sessionStorage.setItem('redirect', path.slice(base.length) || '/');
      }
      window.location.replace(window.location.origin + base + '/');
    </script>
  </head>
</html>
